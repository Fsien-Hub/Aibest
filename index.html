<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AiBest | No Team Studio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="container">
        <header>
            <img src="logo.svg" alt="AiBest Logo" class="logo">
            <h1>AIBEST</h1>
        </header>
        
        <div id="output" class="chat-display">Sistem hazır. Emirlerinizi bekliyorum lider.</div>
        
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Yapay zekaya komut ver...">
            <div class="buttons">
                <button class="btn-chat" onclick="runAI('chat')">SOR / KODLA</button>
                <button class="btn-img" onclick="runAI('img')">GÖRSEL YAP</button>
            </div>
        </div>
        
        <img id="resultImg" class="ai-image" alt="AI Sonucu">
    </div>
    <script src="script.js"></script>
</body>
</html>

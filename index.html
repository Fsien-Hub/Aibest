<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AiBest Elite | No Team</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <button onclick="newChat()" class="btn-plus"><i class="fa-solid fa-plus"></i> Yeni Sohbet</button>
            </div>
            <div id="chatHistory" class="history-container">
                </div>
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="avatar-circle">NT</div>
                    <span>Lider Mode v2.1</span>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <nav class="navbar">
                <div class="nav-left">
                    <button class="menu-trigger" onclick="toggleSidebar()"><i class="fa-solid fa-bars-staggered"></i></button>
                    <div class="brand">
                        <img src="logo.svg" class="logo-spin" alt="NT">
                        <span class="brand-text">AIBEST PRO</span>
                    </div>
                </div>
                <div class="nav-right">
                    <select id="modelSelect" class="custom-select">
                        <option value="gemini">Gemini 1.5 (Pro)</option>
                        <option value="groq">Grok-1 (Turbo)</option>
                    </select>
                </div>
            </nav>

            <div id="chatWindow" class="chat-window">
                <div class="welcome-box">
                    <div class="nt-badge">NO TEAM GLOBAL</div>
                    <h1>Bugün neyi kodluyoruz Lider?</h1>
                    <p>Sistem tüm yapay zeka modelleriyle emrinde.</p>
                </div>
            </div>

            <div class="bottom-area">
                <div id="typing" class="thinking-loader">
                    <div class="bounce-dot"></div>
                    <span>Sistem düşünüyor...</span>
                </div>
                <div class="input-wrapper">
                    <button class="tool-btn" onclick="askForImage()" title="Resim Oluştur"><i class="fa-solid fa-wand-magic-sparkles"></i></button>
                    <textarea id="userInput" placeholder="Mesajınızı buraya yazın..." rows="1"></textarea>
                    <button id="sendBtn" class="send-action"><i class="fa-solid fa-paper-plane"></i></button>
                </div>
                <p class="legal-text">AiBest Pro, No Team altyapısı ile güçlendirilmiştir.</p>
            </div>
        </main>
    </div>
    <div id="sidebarOverlay" class="overlay" onclick="toggleSidebar()"></div>
    <script src="script.js"></script>
</body>
</html>
